version: '3.8'
services:
  backend:
    build: ./backend
    ports:
      - "80:80"
    volumes:
      - ./backend:/code/

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app/
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend
